<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>برنامج إدارة مهام الشركة - كامل</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fdf6e3;
            text-align: center;
            padding: 50px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background-color: #ffebcc;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .done {
            text-decoration: line-through;
            color: gray;
        }
        .late {
            background-color: #ff9999;
        }
        #loginDiv, #taskDiv {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>برنامج إدارة مهام الشركة - كامل</h1>

    <div id="loginDiv">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <button onclick="login()">تسجيل الدخول</button>
    </div>

    <div id="taskDiv" style="display:none;">
        <h2>مرحبا <span id="currentUser"></span></h2>
        <input type="text" id="task" placeholder="المهمة">
        <button onclick="addTask()">إضافة مهمة</button>

        <h3>قائمة المهام:</h3>
        <ul id="taskList"></ul>

        <button onclick="logout()">تسجيل الخروج</button>
    </div>

    <script>
        const users = [
            {username: "admin", password: "123", role: "admin"},
            {username: "employee1", password: "123", role: "employee"},
            {username: "employee2", password: "123", role: "employee"}
        ];

        let currentUser = null;
        let tasks = [];

        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const user = users.find(u => u.username === username && u.password === password);
            if(user){
                currentUser = user;
                document.getElementById("loginDiv").style.display = "none";
                document.getElementById("taskDiv").style.display = "block";
                document.getElementById("currentUser").innerText = currentUser.username;
                showTasks();
            } else {
                alert("اسم المستخدم أو كلمة السر غير صحيحة!");
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById("loginDiv").style.display = "block";
            document.getElementById("taskDiv").style.display = "none";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("taskList").innerHTML = "";
        }

        function addTask() {
            const taskInput = document.getElementById("task").value;
            if(taskInput){
                tasks.push({
                    employee: currentUser.username,
                    task: taskInput,
                    done: false,
                    date: new Date()
                });
                document.getElementById("task").value = "";
                showTasks();
            } else {
                alert("من فضلك اكتب المهمة!");
            }
        }

        function markDone(index) {
            tasks[index].done = !tasks[index].done;
            showTasks();
        }

        function editTask(index) {
            const newTask = prompt("عدل المهمة:", tasks[index].task);
            if(newTask) {
                tasks[index].task = newTask;
                showTasks();
            }
        }

        function deleteTask(index) {
            if(confirm("هل أنت متأكد أنك تريد حذف المهمة؟")) {
                tasks.splice(index, 1);
                showTasks();
            }
        }

        function showTasks() {
            const ul = document.getElementById("taskList");
            ul.innerHTML = "";
            const now = new Date();

            tasks.forEach((t, index) => {
                if(currentUser.role === "admin" || t.employee === currentUser.username){
                    const li = document.createElement("li");
                    const daysOld = Math.floor((now - t.date)/(1000*60*60*24));
                    
                    // لون المهمة لو متأخرة
                    if(daysOld >= 3 && !t.done) li.classList.add("late");

                    // تنبيهات للموظف قبل التأخير
                    if(currentUser.role === "employee" && !t.done && daysOld >= 2) {
                        alert(`تنبيه: المهمة "${t.task}" قربت تتأخر!`);
                    }

                    li.innerHTML = `<strong>${t.employee}:</strong> ${t.task} (${t.date.toLocaleDateString()}) 
                    <button onclick="markDone(${index})">تمت</button> 
                    <button onclick="editTask(${index})">تعديل</button> 
                    <button onclick="deleteTask(${index})">حذف</button>`;
                    if(t.done) li.classList.add("done");

                    ul.appendChild(li);
                }
            });
        }
    </script>
</body>
</html>
