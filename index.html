<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>برنامج إلهام وتسويق متقدم</title>
<style>
    body { font-family: Arial, sans-serif; background-color: #f0f8ff; text-align: center; padding: 50px; }
    input, button, textarea { padding: 10px; font-size: 16px; margin: 5px; }
    #ideaBox { background-color: #ffeebb; padding: 20px; margin-top: 20px; border-radius: 10px; font-size: 18px; min-height: 80px; }
    #comments ul { list-style: none; padding: 0; }
    #comments li { background-color: #ffebcc; margin: 5px 0; padding: 10px; border-radius: 5px; }
</style>
</head>
<body>

<h1>برنامج إلهام وتسويق متقدم للمسوقين</h1>

<div id="loginDiv">
    <input type="text" id="username" placeholder="اسم المسوق">
    <button onclick="login()">تسجيل الدخول</button>
</div>

<div id="mainDiv" style="display:none;">
    <h2>مرحبا <span id="currentUser"></span></h2>

    <div id="ideaBox">
        <p><strong>فكرة اليوم:</strong> <span id="idea"></span></p>
        <p><strong>نصيحة تسويقية:</strong> <span id="tip"></span></p>
        <p><strong>تحفيزك اليومي:</strong> <span id="motivation"></span></p>
    </div>

    <div id="comments">
        <h3>ملاحظاتك اليومية:</h3>
        <textarea id="commentInput" placeholder="اكتب ملاحظتك هنا"></textarea><br>
        <button onclick="addComment()">أضف الملاحظة</button>
        <ul id="commentList"></ul>
    </div>

    <button onclick="logout()">تسجيل الخروج</button>
</div>

<script>
const users = ["Ali", "Sara", "Mona"];
let currentUser = null;

const ideas = [
    "استخدم فيديو قصير لعرض المنتج على وسائل التواصل",
    "اعرض المنتج مع خلفية مختلفة لجذب الانتباه",
    "جرّب تقديم خصم لفترة محدودة لزيادة المبيعات",
    "اصنع قصة صغيرة حول المنتج لتوصيل قيمته",
    "اختبر رأي العملاء في المنتج بطريقة ممتعة",
    "صوّر المنتج أثناء الاستخدام اليومي لجذب الجمهور"
];

const tips = [
    "نشر المحتوى باستمرار يجذب متابعين أكثر",
    "استخدام الهاشتاجات المناسبة يزيد الوصول",
    "التعاون مع مسوق آخر لتوسيع الجمهور",
    "ركز على ميزة واحدة للمنتج في كل منشور",
    "التفاعل مع التعليقات يزيد الثقة والمبيعات",
    "استخدم الصور الطبيعية لجذب المشاهد"
];

const motivations = [
    "كل يوم فرصة جديدة للنجاح! 💪",
    "لا تستسلم، كل جهد محسوب! ✨",
    "ابدأ اليوم وكن الأفضل! 🚀",
    "التحديات تصنع الأفضل دائمًا! 🌟",
    "اعمل بذكاء، النتائج ستظهر قريبًا! 🔥",
    "كل خطوة صغيرة تقربك من الهدف! 💖"
];

let usedIndices = {idea: [], tip: [], motivation: []};

// حفظ الملاحظات في localStorage حسب المستخدم والتاريخ
function saveComment(comment) {
    const today = new Date().toLocaleDateString();
    let allComments = JSON.parse(localStorage.getItem("comments")) || {};
    if(!allComments[currentUser]) allComments[currentUser] = {};
    if(!allComments[currentUser][today]) allComments[currentUser][today] = [];
    allComments[currentUser][today].push(comment);
    localStorage.setItem("comments", JSON.stringify(allComments));
}

function loadComments() {
    const today = new Date().toLocaleDateString();
    document.getElementById("commentList").innerHTML = "";
    let allComments = JSON.parse(localStorage.getItem("comments")) || {};
    if(allComments[currentUser] && allComments[currentUser][today]) {
        allComments[currentUser][today].forEach(c => {
            const li = document.createElement("li");
            li.innerText = c;
            document.getElementById("commentList").appendChild(li);
        });
    }
}

function getRandom(arr, key) {
    if(usedIndices[key].length === arr.length) usedIndices[key] = [];
    let available = arr.map((_, i) => i).filter(i => !usedIndices[key].includes(i));
    let idx = available[Math.floor(Math.random() * available.length)];
    usedIndices[key].push(idx);
    return arr[idx];
}

function login() {
    const username = document.getElementById("username").value;
    if(users.includes(username)){
        currentUser = username;
        document.getElementById("loginDiv").style.display = "none";
        document.getElementById("mainDiv").style.display = "block";
        document.getElementById("currentUser").innerText = currentUser;
        showContent();
        loadComments();
        checkMotivation();
    } else {
        alert("اسم المستخدم غير موجود!");
    }
}

function logout() {
    currentUser = null;
    document.getElementById("loginDiv").style.display = "block";
    document.getElementById("mainDiv").style.display = "none";
    document.getElementById("username").value = "";
    document.getElementById("commentList").innerHTML = "";
}

function showContent() {
    document.getElementById("idea").innerText = getRandom(ideas, 'idea');
    document.getElementById("tip").innerText = getRandom(tips, 'tip');
    document.getElementById("motivation").innerText = getRandom(motivations, 'motivation');
}

function addComment() {
    const commentInput = document.getElementById("commentInput");
    if(commentInput.value){
        saveComment(commentInput.value);
        loadComments();
        commentInput.value = "";
    }
}

// تنبيه وتشجيع تلقائي إذا لم يفتح البرنامج
function checkMotivation() {
    const lastVisit = localStorage.getItem("lastVisit_" + currentUser);
    const today = new Date().toLocaleDateString();
    if(lastVisit !== today){
        alert("💡 تذكير: افتح البرنامج اليوم للحصول على إلهام وتسويق جديد!");
        localStorage.setItem("lastVisit_" + currentUser, today);
    }
}

// تحديث المحتوى تلقائيًا كل 24 ساعة
setInterval(() => {
    if(currentUser){
        showContent();
    }
}, 1000*60*60*24);
</script>
</body>
</html>
